<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CryptoDAA{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-lock-fill me-2"></i>CryptoDAA</a>
    <div class="d-flex gap-3">
      <a class="nav-link text-white {% if request.path == '/' %}active fw-bold{% endif %}" href="/">Dashboard</a>
      <a class="nav-link text-white {% if request.path == '/analysis' %}active fw-bold{% endif %}" href="/analysis">Analysis</a>
      <a class="nav-link text-white {% if request.path == '/audit' %}active fw-bold{% endif %}" href="/audit">Audit Log</a>
    </div>
  </nav>

  <div class="container-fluid py-3">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
